<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>R-Searcher</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      width: 320px;
      max-height: 100vh;
      overflow-x: hidden;
    }
    body {
      width: 320px;
      background: #0f0f0f;
      color: #d4c4c4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      font-size: 13px;
      overflow: visible;
      min-width: 320px;
    }
    body.result-open {
      overflow: visible;
    }
    html.expanded,
    body.expanded {
      width: 670px;
    }
    body::-webkit-scrollbar { display: none; width: 0; height: 0; }
    .popup-shell {
      display: block;
      width: 320px;
      max-width: 100vw;
    }
    .popup-shell.expanded {
      width: 670px;
      max-width: 100vw;
    }
    .header {
      padding: 14px 16px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #111;
    }
    .logo {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: transparent;
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .header-text h1 { font-size: 13px; font-weight: 600; color: #fff; }
    .header-text p { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: .05em; margin-top: 1px; }
    .main { padding: 16px; }
    .smart-btn {
      width: 100%;
      background: #f5e642;
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .smart-btn:hover { background: #ffe800; transform: translateY(-1px); }
    .smart-btn:disabled { background: #2a2a2a; color: #444; cursor: not-allowed; transform: none; }
    body.result-open .hotkeys { display: none; }
    .hotkeys {
      margin-top: 12px;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .hotkey-title { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .hotkey-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .hotkey-row:last-child { margin-bottom: 0; }
    .hotkey-desc { font-size: 11px; color: #666; }
    .hotkey-key {
      font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Menlo, Courier, monospace;
      font-size: 10px;
      background: #1e1e1e;
      color: #888;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid #2a2a2a;
    }
    .result-section {
      display: none;
      padding: 0 16px 14px;
      overflow: visible;
    }
    .result-section.visible { display: block; }
    .divider { height: 1px; background: #1e1e1e; margin-bottom: 12px; }
    .time-saved-line {
      display: none;
      font-size: 12px;
      color: #555;
      margin-bottom: 8px;
      line-height: 1.4;
      animation: fadeIn .3s ease;
    }
    .time-saved-line.visible { display: block; }
    .time-saved-line strong { color: #d0d0d0; font-weight: 600; }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .result-label {
      font-size: 10px;
      color: #f5e642;
      text-transform: uppercase;
      letter-spacing: .05em;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Menlo, Courier, monospace;
    }
    .expand-btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 5px;
      color: #555;
      cursor: pointer;
      font-size: 12px;
      padding: 3px 7px;
      transition: all .15s;
      line-height: 1;
    }
    .expand-btn:hover { color: #f5e642; border-color: #f5e642; background: rgba(245, 230, 66, 0.05); }
    .tab-bar {
      display: flex;
      border-bottom: 2px solid #1e1e1e;
      margin: 0 -12px;
      padding: 0 12px;
      gap: 0;
    }
    .tab {
      flex: 1;
      padding: 10px 12px;
      font-size: 11px;
      color: #666;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      text-align: center;
      transition: color .15s;
    }
    .tab.active {
      color: #f5e642;
      border-bottom-color: #f5e642;
    }
    .tab:hover { color: #aaa; }
    .result-content {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 12px;
      height: 120px;
      overflow-y: auto;
      color: #c4c4c4;
      line-height: 1.7;
      font-size: 12px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
      transition: height .25s ease;
    }
    .result-content.expanded { height: 520px; }
    .result-content strong { color: #fff; }
    .result-content ul { padding-left: 14px; margin: 4px 0; }
    .result-content li { margin: 3px 0; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .copy-row { margin-top: 10px; }
    .copy-all-btn {
      width: 100%;
      background: #1a1a1a;
      color: #aaa;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 9px;
      font-size: 11px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-weight: 500;
    }
    .copy-all-btn:hover { background: #f5e642; color: #0f0f0f; border-color: #f5e642; }
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 0;
      color: #555;
      font-size: 12px;
    }
    .spinner {
      width: 15px;
      height: 15px;
      border: 2px solid #2a2a2a;
      border-top-color: #f5e642;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .error-msg { color: #ff6b6b; font-size: 12px; padding: 10px 0; line-height: 1.5; }
    .footer-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 8px 16px 12px;
      border-top: 1px solid #1a1a1a;
    }
    .settings-link { font-size: 11px; color: #888; cursor: pointer; text-decoration: none; transition: color .15s; }
    .settings-link:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="popup-shell">
    <div class="header">
      <div class="logo"><img src="R-Searcher.png" alt="R-Searcher logo"></div>
      <div class="header-text">
        <h1>R-Searcher</h1>
        <p id="subtitle"></p>
      </div>
    </div>

    <div class="main">
      <button class="smart-btn" id="analyze-btn"></button>
      <div class="hotkeys">
        <div class="hotkey-title" id="hotkeys-title-a"></div>
        <div class="hotkey-row">
          <span class="hotkey-desc" id="hk-explain"></span>
          <span class="hotkey-key">Ctrl+Shift+E</span>
        </div>
        <div class="hotkey-row">
          <span class="hotkey-desc" id="hk-analyze"></span>
          <span class="hotkey-key">Ctrl+Shift+R</span>
        </div>
        <div class="hotkey-row">
          <span class="hotkey-desc" id="hk-copy"></span>
          <span class="hotkey-key">Ctrl+Shift+C</span>
        </div>
      </div>
    </div>

    <div class="result-section" id="result-section-analyze">
      <div class="divider"></div>
      <div class="time-saved-line" id="time-hero"></div>

      <div class="result-header">
        <span class="result-label" id="result-label-analyze"></span>
        <button class="expand-btn" id="expand-btn" title="Expand">⤢</button>
      </div>

      <div class="tab-bar" id="tab-bar" style="display:none">
        <div class="tab active" data-tab="essence" id="tab-essence"></div>
        <div class="tab" data-tab="notes" id="tab-notes"></div>
        <div class="tab" data-tab="next-steps" id="tab-next-steps"></div>
      </div>

      <div class="result-content" id="result-content-analyze">
        <div class="tab-content active" id="content-essence"></div>
        <div class="tab-content" id="content-notes"></div>
        <div class="tab-content" id="content-next-steps"></div>
      </div>
      <div class="copy-row"><button class="copy-all-btn" id="copy-btn-analyze"></button></div>
    </div>

    <div class="footer-row">
      <a href="#" class="settings-link" id="settings-link"></a>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
